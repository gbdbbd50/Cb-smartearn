<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cb SmartEarn| My Plans</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* 🔹 NO STYLE CHANGES */
:root{
  --primary:#0f766e;
  --secondary:#134e4a;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --success:#16a34a;
  --error:#dc2626;
}
*{box-sizing:border-box;font-family:Inter,sans-serif}
body{margin:0;background:var(--bg)}
header{
  background:#fff;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 14px rgba(0,0,0,.05)
}
.logo{font-size:22px;font-weight:700;color:var(--primary)}
a.back{text-decoration:none;color:var(--primary);font-weight:600}
main{max-width:1100px;margin:auto;padding:28px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}
.plan{
  background:var(--card);
  padding:22px;
  border-radius:16px;
  box-shadow:0 16px 40px rgba(0,0,0,.06);
}
button{
  padding:10px;
  border:none;
  border-radius:8px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}
button:disabled{opacity:.6;cursor:not-allowed;}
.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:14px 18px;
  border-radius:8px;
  color:#fff;
  opacity:0;
  transform:translateY(20px);
  transition:.3s;
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--error)}
</style>
</head>

<body>

<header>
  <div class="logo">Cb SmartEarn</div>
  <a href="dashboard.html" class="back">← Home</a>
  <a href="invest.html" class="onclick">Buy</a>
</header>

<main>
  <h1>My Plans</h1>
  <address>loading....</address>
  <div id="plans" class="grid"></div>
</main>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
import { getFirestore, collection, query, where, getDocs, doc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBTJPnHAP3OGWDPbNHCHmrADSln8FyUxK4",
  authDomain: "estateearn-1b31c.firebaseapp.com",
  projectId: "estateearn-1b31c"
});

const auth = getAuth(app);
const db = getFirestore(app);

let currentUser, userData;

function toast(msg,type){
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove("show"),3000);
}

function format(ts){
  return ts?.toDate ? ts.toDate().toLocaleString() : "Never";
}

async function loadPlans(){
  const box=document.getElementById("plans");
  box.innerHTML="";

  const q=query(collection(db,"investments"),where("uid","==",currentUser.uid));
  const snap=await getDocs(q);

  snap.forEach(d=>{
    const inv=d.data();
    const id=d.id;

    const totalClaimed=inv.totalClaimed||0;
    const expected=inv.expected;
    const last=inv.lastClaimed?.toDate()||inv.createdAt.toDate();
    const hours=Math.floor((Date.now()-last)/3600000);
    const maxClaimable=expected-totalClaimed;
    const claimable=Math.max(0,Math.min(hours*inv.hourly,maxClaimable));
    const expired=totalClaimed>=expected;

    box.innerHTML+=`
    <div class="plan">
      <h3>${inv.plan}</h3>
      <p>Hourly: ₦${inv.hourly}</p>
      <p>Duration: ${inv.duration} Days</p>
      <p>Expected: ₦${expected.toLocaleString()}</p>
      <p>Total Claimed: ₦${totalClaimed.toLocaleString()}</p>
      <p>Status: ${expired?"Expired":"Active"}</p>
      <p>Last Claimed: ${format(inv.lastClaimed)}</p>
      <p>Available: ₦${claimable.toLocaleString()}</p>
      <button ${claimable<=0||expired?"disabled":""}
        onclick="claim('${id}',${claimable})">
        Claim
      </button>
    </div>`;
  });
}

window.claim=async(id,amount)=>{
  if(amount<=0)return;

  try{
    await updateDoc(doc(db,"investments",id),{
      lastClaimed:serverTimestamp(),
      totalClaimed:amount,
      status:"active"
    });

    await updateDoc(doc(db,"users",currentUser.uid),{
      balance:(userData.balance||0)+amount,
      earnings:(userData.earnings||0)+amount
    });

    userData.balance+=amount;
    userData.earnings+=amount;

    toast(`₦${amount.toLocaleString()} claimed`,"success");
    loadPlans();
  }catch(e){
    toast(e.message,"error");
  }
};

onAuthStateChanged(auth,async u=>{
  if(!u)location.href="login.html";
  currentUser=u;

  const q=query(collection(db,"users"),where("uid","==",u.uid));
  const s=await getDocs(q);
  userData=s.docs[0].data();
  loadPlans();
});
</script>

</body>
</html>
