<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cb SmartEarn | Deposit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0f766e;
  --secondary:#134e4a;
  --bg:#f1f5f9;
  --card:#ffffff;
  --text:#0f172a;
  --muted:#64748b;
  --success:#16a34a;
  --error:#dc2626;
}

*{box-sizing:border-box;font-family:Inter,sans-serif}
body{margin:0;background:var(--bg)}

header{
  background:#fff;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 4px 14px rgba(0,0,0,.05)
}

.logo{font-size:22px;font-weight:700;color:var(--primary)}
a.back{text-decoration:none;color:var(--primary);font-weight:600}

main{
  max-width:900px;
  margin:auto;
  padding:28px;
}

h1{margin-bottom:6px}
.subtitle{color:var(--muted);margin-bottom:22px}

.card{
  background:var(--card);
  padding:24px;
  border-radius:16px;
  box-shadow:0 16px 40px rgba(0,0,0,.06);
  margin-bottom:24px;
}

.methods{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}

.method{
  border:2px solid #e5e7eb;
  padding:18px;
  border-radius:14px;
  cursor:pointer;
  transition:.2s;
}

.method.active{
  border-color:var(--primary);
  background:#f0fdfa;
}

.method.disabled{
  opacity:.5;
  cursor:not-allowed;
}

.method h3{margin:0 0 6px}
.method p{margin:0;color:var(--muted);font-size:14px}

label{
  display:block;
  margin-bottom:6px;
  font-weight:600;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  font-size:15px;
  margin-bottom:16px;
}

.summary{
  background:#f8fafc;
  padding:16px;
  border-radius:12px;
  font-size:15px;
}

.summary div{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  font-size:16px;
  cursor:pointer;
  margin-top:16px;
}

button:disabled{
  opacity:.6;
  cursor:not-allowed;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:14px 18px;
  border-radius:8px;
  color:#fff;
  opacity:0;
  transform:translateY(20px);
  transition:.3s;
  z-index:1000
}
.toast.show{opacity:1;transform:translateY(0)}
.toast.success{background:var(--success)}
.toast.error{background:var(--error)}
</style>
</head>

<body>

<header>
  <div class="logo">Cb SmartEarn</div>
  <a href="dashboard.html" class="back">← Dashboard</a>
</header>

<main>

<h1>Make a Deposit</h1>
<p class="subtitle">Fund your account to start investing</p>

<div class="card">
  <h3>Select Deposit Method</h3>

  <div class="methods">
    <div class="method active" data-method="manual">
      <h3>Manual Deposit</h3>
      <p>Bank Transfer • <strong>+5% bonus</strong></p>
    </div>

    <div class="method disabled">
      <h3>Crypto Deposit</h3>
      <p>Under development</p>
    </div>

    <div class="method disabled">
      <h3>Online Payment</h3>
      <p>Under development</p>
    </div>
  </div>
</div>

<div class="card">
  <label>Deposit Amount (₦)</label>
  <input type="number" id="amount" placeholder="Minimum ₦2,000">

  <div class="summary">
    <div>
      <span>Deposit Amount</span>
      <span id="base">₦0</span>
    </div>
    <div>
      <span>Bonus</span>
      <span id="bonus">₦0</span>
    </div>
    <div style="font-weight:700">
      <span>Total Credited</span>
      <span id="total">₦0</span>
    </div>
  </div>

  <button id="proceedBtn">Proceed to Payment</button>
</div>

</main>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc,
  addDoc, collection, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBTJPnHAP3OGWDPbNHCHmrADSln8FyUxK4",
  authDomain: "estateearn-1b31c.firebaseapp.com",
  projectId: "estateearn-1b31c"
});

const auth = getAuth(app);
const db = getFirestore(app);

let userData = null;
let selectedMethod = "manual";

const amountInput = document.getElementById("amount");
const baseEl = document.getElementById("base");
const bonusEl = document.getElementById("bonus");
const totalEl = document.getElementById("total");
const proceedBtn = document.getElementById("proceedBtn");

const toast = (msg,type)=>{
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove("show"),3000);
};

// Method selection
document.querySelectorAll(".method").forEach(m=>{
  if(m.classList.contains("disabled")) return;
  m.onclick=()=>{
    document.querySelectorAll(".method").forEach(x=>x.classList.remove("active"));
    m.classList.add("active");
    selectedMethod=m.dataset.method;
    calculate();
  }
});

function calculate(){
  const amt = Number(amountInput.value)||0;
  let bonus = 0;

  if(selectedMethod==="manual" && amt>=2000){
    bonus = Math.floor(amt * 0.05);
  }

  baseEl.textContent = "₦" + amt.toLocaleString();
  bonusEl.textContent = "₦" + bonus.toLocaleString();
  totalEl.textContent = "₦" + (amt+bonus).toLocaleString();
}

amountInput.oninput = calculate;

proceedBtn.onclick = async()=>{
  const amt = Number(amountInput.value);
  if(!amt || amt < 2000){
    toast("Minimum deposit is ₦2,000","error");
    return;
  }

  // Save locally for payment page
  localStorage.setItem("depositAmount", amt);
  localStorage.setItem("depositMethod", selectedMethod);

  await addDoc(collection(db,"deposits"),{
    uid: auth.currentUser.uid,
    amount: amt,
    method: selectedMethod,
    bonus: selectedMethod==="manual" ? Math.floor(amt*0.05) : 0,
    status: "awaiting",
    createdAt: serverTimestamp()
  });

  // Redirect to payment page
  location.href = selectedMethod === "manual"
    ? "manualpayment.html"
    : "deposit.html";
};

onAuthStateChanged(auth, async(user)=>{
  if(!user) return location.href="login.html";

  const snap = await getDoc(doc(db,"users",user.uid));
  userData = snap.data();

  // Must be an investor
  if(!userData || userData.investmentCount < 1){
    toast("Only investors can make deposits","error");
    proceedBtn.disabled = true;
  }
});
</script>

</body>
</html>
