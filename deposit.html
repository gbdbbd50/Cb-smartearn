<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cb SmartEarn | Deposit</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
:root{
  --primary:#0f766e;
  --bg:#f1f5f9;
  --card:#ffffff;
  --success:#16a34a;
  --error:#dc2626;
}
*{box-sizing:border-box;font-family:Inter,sans-serif}
body{margin:0;background:var(--bg)}

header{
  background:#fff;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  box-shadow:0 4px 14px rgba(0,0,0,.05)
}

.logo{font-size:22px;font-weight:700;color:var(--primary)}

main{max-width:900px;margin:auto;padding:28px}

.card{
  background:#fff;
  padding:24px;
  border-radius:16px;
  margin-bottom:24px;
}

.methods{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:18px;
}

.method{
  border:2px solid #e5e7eb;
  padding:18px;
  border-radius:14px;
  cursor:pointer;
}

.method.active{
  border-color:var(--primary);
  background:#f0fdfa;
}

.method.disabled{
  opacity:.5;
  cursor:not-allowed;
}

input{
  width:100%;
  padding:14px;
  border-radius:10px;
  border:1px solid #e5e7eb;
  margin-bottom:16px;
}

.summary{
  background:#f8fafc;
  padding:16px;
  border-radius:12px;
}

.summary div{
  display:flex;
  justify-content:space-between;
  margin-bottom:8px;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  cursor:pointer;
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:14px;
  border-radius:8px;
  color:#fff;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1}
.toast.success{background:var(--success)}
.toast.error{background:var(--error)}
</style>
</head>

<body>

<header>
  <div class="logo">Cb SmartEarn</div>
</header>

<main>

<h2>Make a Deposit</h2>

<div class="card">
  <h3>Select Method</h3>

  <div class="methods">
    <div class="method" data-method="manual">
      <h3>Manual Deposit</h3>
      <p>Bank Transfer</p>
    </div>

    <div class="method active" data-method="online">
      <h3>Online Payment</h3>
      <p>Instant (Paystack)</p>
    </div>

    <div class="method disabled">
      <h3>Crypto</h3>
      <p>Coming soon</p>
    </div>
  </div>
</div>

<div class="card">
  <label>Amount (₦)</label>
  <input type="number" id="amount" placeholder="Minimum ₦2,000">

  <div class="summary">
    <div><span>Amount</span><span id="base">₦0</span></div>
    <div style="font-weight:700"><span>Total</span><span id="total">₦0</span></div>
  </div>

  <button id="proceedBtn">Proceed</button>
</div>

</main>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";
import {
  getFirestore, doc, getDoc, updateDoc,
  addDoc, collection, serverTimestamp
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyBTJPnHAP3OGWDPbNHCHmrADSln8FyUxK4",
  authDomain: "estateearn-1b31c.firebaseapp.com",
  projectId: "estateearn-1b31c"
});

const auth = getAuth(app);
const db = getFirestore(app);

let selectedMethod = "online";

const amountInput = document.getElementById("amount");
const baseEl = document.getElementById("base");
const totalEl = document.getElementById("total");
const proceedBtn = document.getElementById("proceedBtn");

const toast = (msg,type)=>{
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove("show"),3000);
};

// Select method
document.querySelectorAll(".method").forEach(m=>{
  if(m.classList.contains("disabled")) return;
  m.onclick=()=>{
    document.querySelectorAll(".method").forEach(x=>x.classList.remove("active"));
    m.classList.add("active");
    selectedMethod=m.dataset.method;
  }
});

// Calculate
amountInput.oninput=()=>{
  const amt = Number(amountInput.value)||0;
  baseEl.textContent = "₦"+amt.toLocaleString();
  totalEl.textContent = "₦"+amt.toLocaleString();
};

// Proceed
proceedBtn.onclick = async()=>{
  const amt = Number(amountInput.value);
  if(!amt || amt < 2000){
    toast("Minimum deposit is ₦2,000","error");
    return;
  }

  const user = auth.currentUser;

  // MANUAL
  if(selectedMethod==="manual"){
    await addDoc(collection(db,"deposits"),{
      uid:user.uid,
      amount:amt,
      method:"manual",
      status:"pending",
      createdAt:serverTimestamp()
    });

    location.href="manualpayment.html";
    return;
  }

  // PAYSTACK
  proceedBtn.disabled=true;
  proceedBtn.textContent="Processing...";

  PaystackPop.setup({
    key:"pk_live_e2bee25e1d29c785e92734435801bd495f5348f5",
    email:user.email,
    amount:amt*100,
    currency:"NGN",
    ref:"DEP_"+Date.now(),

    callback: async(res)=>{
      try{
        const userRef = doc(db,"users",user.uid);

        // Get user balance
        const snap = await getDoc(userRef);
        const data = snap.data();

        const balanceBefore = data.balance || 0;
        const balanceAfter = balanceBefore + amt;

        // Save deposit
        await addDoc(collection(db,"deposits"),{
          uid:user.uid,
          amount:amt,
          method:"online",
          status:"success",
          reference:res.reference,
          balanceBefore,
          balanceAfter,
          createdAt:serverTimestamp()
        });

        // Update user balance
        await updateDoc(userRef,{
          balance: balanceAfter
        });

        // 🔥 REFERRAL BONUS (5%)
        if(data.invitedBy){
          const referrerRef = doc(db,"users",data.invitedBy);
          const refSnap = await getDoc(referrerRef);

          if(refSnap.exists()){
            const refData = refSnap.data();
            const refBonus = Math.floor(amt * 0.05);

            await updateDoc(referrerRef,{
              balance: (refData.balance || 0) + refBonus
            });

            // Optional: log referral earning
            await addDoc(collection(db,"referrals"),{
              referrer: data.invitedBy,
              from: user.uid,
              amount: amt,
              bonus: refBonus,
              createdAt: serverTimestamp()
            });
          }
        }

        toast("Deposit successful","success");
        setTimeout(()=>location.href="dashboard.html",1500);

      }catch(e){
        console.error(e);
        toast("Error completing deposit","error");
      }
    },

    onClose:()=>{
      proceedBtn.disabled=false;
      proceedBtn.textContent="Proceed";
      toast("Payment cancelled","error");
    }
  }).openIframe();
};

// Auth check
onAuthStateChanged(auth,user=>{
  if(!user) location.href="login.html";
});
</script>

</body>
</html>
