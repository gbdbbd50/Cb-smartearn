<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8">  
  <title>Cb SmartEarn | Dashboard</title>  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">  
  
  <style>  
    :root{  
      --primary:#0f766e;  
      --secondary:#134e4a;  
      --bg:#f1f5f9;  
      --card:#ffffff;  
      --text:#0f172a;  
      --muted:#64748b;  
      --success:#16a34a;  
      --error:#dc2626;  
    }  
  
    *{box-sizing:border-box;font-family:Inter,sans-serif}  
  
    body{  
      margin:0;  
      background:var(--bg);  
      min-height:100vh;  
    }  
  
    header{  
      background:#fff;  
      padding:16px 28px;  
      display:flex;  
      align-items:center;  
      justify-content:space-between;  
      box-shadow:0 4px 14px rgba(0,0,0,.05);  
    }  
  
    .logo{  
      font-size:22px;  
      font-weight:700;  
      color:var(--primary);  
    }  
  
    .user{  
      font-size:14px;  
      font-weight:600;  
      color:var(--text);  
    }  
  
    main{  
      padding:28px;  
      max-width:1000px;  
      margin:auto;  
    }  
  
    .welcome{  
      margin-bottom:24px;  
    }  
  
    .welcome h1{  
      font-size:28px;  
      margin:0 0 6px;  
    }  
  
    .welcome p{  
      color:var(--muted);  
      font-size:14px;  
    }  
  
    .grid{  
      display:grid;  
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));  
      gap:20px;  
      margin-bottom:28px;  
    }  
  
    .card{  
      background:var(--card);  
      padding:22px;  
      border-radius:14px;  
      box-shadow:0 14px 35px rgba(0,0,0,.06);  
    }  
  
    .card h3{  
      margin:0 0 8px;  
      font-size:14px;  
      color:var(--muted);  
      font-weight:600;  
    }  
  
    .card .value{  
      font-size:26px;  
      font-weight:700;  
      color:var(--text);  
    }  
  
    .actions{  
      display:flex;  
      flex-wrap:wrap;  
      gap:16px;  
    }  
  
    .actions button{  
      flex:1 1 200px;  
      padding:14px;  
      background:var(--primary);  
      color:#fff;  
      border:none;  
      border-radius:8px;  
      font-weight:600;  
      font-size:15px;  
      cursor:pointer;  
      transition:.2s;  
    }  
  
    .actions button:hover{  
      background:var(--secondary);  
    }  
  
    .logout{  
      background:none;  
      border:none;  
      color:#dc2626;  
      font-weight:600;  
      cursor:pointer;  
    }  
  
    .loader{  
      position:fixed;  
      inset:0;  
      background:#fff;  
      display:flex;  
      align-items:center;  
      justify-content:center;  
      z-index:999;  
    }  
  
    .spinner{  
      width:48px;  
      height:48px;  
      border:4px solid #e5e7eb;  
      border-top:4px solid var(--primary);  
      border-radius:50%;  
      animation:spin 1s linear infinite;  
    }  
  
    @keyframes spin{  
      to{transform:rotate(360deg)}  
    }  
  </style>  
</head>  
  
<body>  
  
<div class="loader" id="loader">  
  <div class="spinner"></div>  
</div>  
  
<header>  
  <div class="logo">Cb SmartEarn</div>  
  <div>  
    Welcome <span class="user" id="userName"></span>  
    <button class="logout" id="logoutBtn">Logout</button>  
  </div>  
</header>  
  
<main>  
  <div class="welcome">  
    <h1>Dashboard</h1>  
    <p>Track your investments and grow your wealth with Cb SmartEarn.</p>  
  </div>  
  
  <!-- Investor Summary -->  
  <div class="grid">  
    <div class="card">  
      <h3>Available balance</h3>  
      <div class="value" id="balance">₦0</div>  
    </div>  
    <div class="card">  
      <h3>Total Earnings</h3>  
      <div class="value" id="earnings">₦0</div>  
    </div>  
    <div class="card">  
      <h3>Referral Count</h3>  
      <div class="value" id="referrals">0</div>  
    </div>  
    <div class="card">  
      <h3>Account Status</h3>  
      <div class="value" style="font-size:18px;color:var(--primary)">Active</div>  
    </div>  
    <a href="progress.html">Account progress</a>
  </div>  
  
  <!-- Action Buttons -->  
  <div class="actions">  
    <button id="depositBtn">Deposit</button>  
    <button id="withdrawBtn">Withdraw</button>  
    <button id="viewPlansBtn">Buy Plans</button>  
    <button id="referralBtn">Referral</button>  
    <button id="myplansbtn">Running plans</button>
    <button id="profilebtn">Profile</button>
  </div>  
</main>  
  
<script type="module">  
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";  
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";  
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-firestore.js";  
  
  const firebaseConfig = {  
    apiKey: "AIzaSyBTJPnHAP3OGWDPbNHCHmrADSln8FyUxK4",  
    authDomain: "estateearn-1b31c.firebaseapp.com",  
    projectId: "estateearn-1b31c",  
    storageBucket: "estateearn-1b31c.firebasestorage.app",  
    messagingSenderId: "829960797683",  
    appId: "1:829960797683:web:2fa2f99ada0c724160e686"  
  };  
  
  const app = initializeApp(firebaseConfig);  
  const auth = getAuth(app);  
  const db = getFirestore(app);  
  
  const loader = document.getElementById("loader");  
  
  // Local storage check  
  const localUser = JSON.parse(localStorage.getItem("smartestateUser"));  
  if(!localUser){  
    window.location.href = "login.html";  
  }  
  
  onAuthStateChanged(auth, async user => {  
    if(!user){  
      localStorage.removeItem("smartestateUser");  
      window.location.href = "login.html";  
      return;  
    }  
  
    const snap = await getDoc(doc(db,"users",user.uid));  
    if(!snap.exists()){  
      window.location.href = "login.html";  
      return;  
    }  
  
    const data = snap.data();  
  
    // Role check: Only investors  
    if(data.model !== "investor"){  
      window.location.href = "chisom.html";  
      return;  
    }  
  
    // Populate UI  
    document.getElementById("userName").textContent = data.username;  
    document.getElementById("balance").textContent = `₦${(data.balance || 0).toLocaleString()}`;  
    document.getElementById("earnings").textContent = `₦${(data.earnings || 0).toLocaleString()}`;  
    document.getElementById("referrals").textContent = data.referrals || 0;  
  
    loader.style.display = "none";  
  });  
  
  document.getElementById("logoutBtn").addEventListener("click", async () => {  
    await signOut(auth);  
    localStorage.removeItem("smartestateUser");  
    window.location.href = "login.html";  
  });  
  
  // Redirect buttons to pages  
  document.getElementById("depositBtn").addEventListener("click", () => {  
    window.location.href = "deposit.html";  
  });  
  document.getElementById("withdrawBtn").addEventListener("click", () => {  
    window.location.href = "withdraw.html";  
  });  
  document.getElementById("viewPlansBtn").addEventListener("click", () => {  
    window.location.href = "invest.html";  
  });  
  document.getElementById("referralBtn").addEventListener("click", () => {  
    window.location.href = "referral.html";  
  });  
  document.getElementById("myplansbtn").addEventListener("click", () => {  
    window.location.href = "myplans.html";  
  });  
  document.getElementById("profilebtn").addEventListener("click", () => {  
    window.location.href = "profile.html";  
  });  
</script>  
  
</body>  
</html>
