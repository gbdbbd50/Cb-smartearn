<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cb SmartEarn | Profile</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#0f766e;
  --bg:#f1f5f9;
  --card:#ffffff;
  --muted:#64748b;
  --success:#16a34a;
  --error:#dc2626;
}

*{box-sizing:border-box;font-family:Inter,sans-serif}
body{margin:0;background:var(--bg)}

header{
  background:#fff;
  padding:16px 24px;
  display:flex;
  justify-content:space-between;
  box-shadow:0 4px 14px rgba(0,0,0,.05)
}

.logo{font-size:22px;font-weight:700;color:var(--primary)}
a.back{text-decoration:none;color:var(--primary);font-weight:600}

main{
  max-width:600px;
  margin:auto;
  padding:28px;
}

.card{
  background:var(--card);
  padding:20px;
  border-radius:14px;
  margin-bottom:20px;
  box-shadow:0 10px 30px rgba(0,0,0,.05);
}

h3{margin-top:0}

input{
  width:100%;
  padding:12px;
  border-radius:8px;
  border:1px solid #e5e7eb;
  margin-bottom:12px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:10px;
  background:var(--primary);
  color:#fff;
  font-weight:600;
  cursor:pointer;
  margin-top:8px;
}

.secondary{
  background:#e2e8f0;
  color:#0f172a;
}

.danger{
  background:var(--error);
}

.toast{
  position:fixed;
  bottom:20px;
  right:20px;
  padding:14px;
  border-radius:8px;
  color:#fff;
  opacity:0;
  transition:.3s;
}
.toast.show{opacity:1}
.toast.success{background:var(--success)}
.toast.error{background:var(--error)}
</style>
</head>

<body>

<header>
  <div class="logo">Cb SmartEarn</div>
  <a href="dashboard.html" class="back">← Dashboard</a>
</header>

<main>

<div class="card">
  <h3>Profile Info</h3>
  <p><strong>Email:</strong> <span id="email">Loading...</span></p>
</div>

<div class="card">
  <h3>Support</h3>
  <button class="secondary" onclick="location.href='support.html'">
    Contact Support
  </button>
</div>

<div class="card">
  <h3>Change Password</h3>

  <input type="password" id="newPassword" placeholder="New Password">
  <button id="changePasswordBtn">Update Password</button>
</div>

<div class="card">
  <h3>Account</h3>
  <button class="danger" id="logoutBtn">Logout</button>
</div>

</main>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.8.0/firebase-app.js";
import {
  getAuth, onAuthStateChanged,
  updatePassword, signOut
} from "https://www.gstatic.com/firebasejs/12.8.0/firebase-auth.js";

const app = initializeApp({
  apiKey: "AIzaSyBTJPnHAP3OGWDPbNHCHmrADSln8FyUxK4",
  authDomain: "estateearn-1b31c.firebaseapp.com",
  projectId: "estateearn-1b31c"
});

const auth = getAuth(app);

const emailEl = document.getElementById("email");
const changeBtn = document.getElementById("changePasswordBtn");
const logoutBtn = document.getElementById("logoutBtn");

const toast = (msg,type)=>{
  const t=document.getElementById("toast");
  t.textContent=msg;
  t.className=`toast ${type} show`;
  setTimeout(()=>t.classList.remove("show"),3000);
};

// AUTH CHECK
onAuthStateChanged(auth,(user)=>{
  if(!user){
    location.href="login.html";
    return;
  }

  emailEl.textContent = user.email;
});

// CHANGE PASSWORD
changeBtn.onclick = async()=>{
  const newPass = document.getElementById("newPassword").value;

  if(newPass.length < 6){
    toast("Password must be at least 6 characters","error");
    return;
  }

  try{
    await updatePassword(auth.currentUser, newPass);
    toast("Password updated successfully","success");
    document.getElementById("newPassword").value="";
  }catch(e){
    if(e.code === "auth/requires-recent-login"){
      toast("Please log out and log in again before changing password","error");
    }else{
      toast("Error updating password","error");
    }
  }
};

// LOGOUT
logoutBtn.onclick = async()=>{
  await signOut(auth);
  location.href="login.html";
};
</script>

</body>
</html>
